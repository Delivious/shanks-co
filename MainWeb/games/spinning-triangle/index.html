<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="../../../Assets/imgs/triangleFavicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinning Triangle</title>
  <link rel="icon" type="image/gif" href="../../../Assets/imgs/spinnytriangle.gif">
</head>
<body>

<h1 id="h1">Time You have watched a spinning triangle: 0:0:00</h1>
<h2 id="h2">Bounces: 0</h2>
<h2 id="h3">Triangles: 0</h2>

<script>

class Triangle {
  constructor(element, x, y, rotation, dx, dy) {
    this.element = element;
    this.x = x;
    this.y = y;
    this.rotation = rotation;
    this.dx = dx;
    this.dy = dy;
  }
}

let triCount = 0;
const triangles = [];
let bounces = 0;

// CACHE WINDOW SIZE
let screenWidth = window.innerWidth;
let screenHeight = window.innerHeight;

window.addEventListener("resize", () => {
  screenWidth = window.innerWidth;
  screenHeight = window.innerHeight;
});

// CACHE DOM ELEMENTS
const h1 = document.getElementById("h1");
const h2 = document.getElementById("h2");
const h3 = document.getElementById("h3");

// TRIANGLE SIZE
const TRI_SIZE = 100;

function createTriangle(x, y){

  triCount++;

  const div = document.createElement("div");
  div.className = "triangle-up";

  // GPU ACCELERATION
  div.style.willChange = "transform";
  changeColor(div);
  const triangle = new Triangle(
    div,

    // USE PROVIDED POSITION IF EXISTS
    Math.floor(Math.random() * (screenWidth - TRI_SIZE)),

    Math.floor(Math.random() * (screenHeight - TRI_SIZE)),

    0,

    (Math.random() * 8) + 2,

    (Math.random() * 8) + 2
  );

  document.body.appendChild(div);

  // SAVE REFERENCE
  div.triangleRef = triangle;

  triangles.push(triangle);
}

// first triangle
createTriangle(0,0);


// SINGLE CLICK HANDLER (EVENT DELEGATION)
document.body.addEventListener("click", (e) => {

  if(!e.target.classList.contains("triangle-up")) return;

  const triangle = e.target.triangleRef;

  createTriangle(
    triangle.x + 50,
    triangle.y + 50
  );
});

let seconds = 0;
let minutes = 0;
let hours = 0;

function animate(triangle){

  triangle.x += triangle.dx;
  triangle.y += triangle.dy;

  triangle.rotation += 5;

  if(triangle.rotation >= 360){
    triangle.rotation = 0;
  }

  // NO MORE clientWidth/clientHeight
  if(
    triangle.x + TRI_SIZE >= screenWidth ||
    triangle.x <= 0
  ){
    triangle.dx *= -1;
    changeColor(triangle.element);
    bounces++;
  }

  if(
    triangle.y + TRI_SIZE >= screenHeight ||
    triangle.y <= 0
  ){
    triangle.dy *= -1;
    changeColor(triangle.element);
    bounces++;
  }

  // translate3d = GPU accelerated
  triangle.element.style.transform =
    `translate3d(${triangle.x}px, ${triangle.y}px, 0)
     rotate(${triangle.rotation}deg)`;
}

function changeColor(obj) {
  const randomColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
  obj.style.borderBottomColor = randomColor;
}

function timeSpentWatching() {

  seconds++;

  if(seconds >= 60){
    minutes++;
    seconds = 0;
  }

  if(minutes >= 60){
    hours++;
    minutes = 0;
  }

  h1.innerText =
    `Time You have watched a spinning triangle: ${hours}:${minutes}:${seconds.toString().padStart(2, "0")}`;
}

// FASTER LOOP
function animation(){

  // NORMAL FOR LOOP IS FASTER
  for(let i = 0; i < triangles.length; i++){
    animate(triangles[i]);
  }

  requestAnimationFrame(animation);
}

requestAnimationFrame(animation);

setInterval(timeSpentWatching, 1000);

// UPDATE UI LESS OFTEN
setInterval(() => {

  h2.innerText = `Bounces: ${bounces}`;
  h3.innerText = `Triangles: ${triCount}`;

}, 1000);

</script>
</body>
</html>
