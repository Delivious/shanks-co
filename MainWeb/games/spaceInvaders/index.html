<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga But Garbage</title>
</head>
<body>
    <img src="assets/ship.png" id="ship">
    <div id="startBtn">Start</div>
    <script>
        let enemyCount = 0
        function isCollision(obj1, obj2){
            const a = obj1.getBoundingClientRect()
            const b = obj2.getBoundingClientRect()
            return ( 
                a.right > b.left &&
                a.left < b.right &&
                a.bottom > b.top &&
                a.top < b.bottom
            )
        }
        function spawnEnemy(x, y, type){
            const enemy = document.createElement("img")

            enemy.className = "enemy"

            enemy.src = `assets/${type}.png`

            enemy.dataset.health =
                type === "goober1" ? 1 :
                type === "goober2" ? 2 : 
                type === "goober3" ? 3 : 10

            enemy.style.transform = `translate(${x}px, ${y}px)`

            document.body.appendChild(enemy)
            enemyInt = setInterval(()=>{
                const laserList = document.getElementsByClassName("laser")
                let laser = null
                for(let i = 0; i < laserList.length; i++){
                    laser = laserList[i]
                    if(laser){
                        if(isCollision(enemy, laser)){
                            document.body.removeChild(laser)
                            enemy.dataset.health = Number(enemy.dataset.health) - 1
                            if(Number(enemy.dataset.health) <= 0){
                                document.body.removeChild(enemy)
                                enemyCount--
                                clearInterval(enemyInt)
                            }
                            break
                        }
                    }

                }
                
            },150)
        }
        function spawnFormation(){

            const formations = {

                // rectangle wall
                form1: ()=>{
                    
                    for(let row = 0; row < 3; row++){
                        for(let col = 0; col < 8; col++){
                            enemyCount++
                            let type =
                                row === 0 ? "goober3" :
                                row === 1 ? "goober2" :
                                "goober1"

                            spawnEnemy(
                                150 + (col * 100),
                                50 + (row * 100),
                                type
                            )
                        }
                    }
                },

                // triangle
                form2: ()=>{
                    
                    for(let row = 0; row < 5; row++){

                        for(let col = 0; col <= row; col++){
                            enemyCount++
                            let type =
                                row >= 3 ? "goober3" :
                                row >= 1 ? "goober2" :
                                "goober1"

                            spawnEnemy(
                                600 + (col * 90) - (row * 45),
                                50 + (row * 90),
                                type
                            )
                        }
                    }
                },

                // V shape
                form3: ()=>{
                    
                    for(let i = 0; i < 6; i++){
                        enemyCount++
                        spawnEnemy(
                            500 - (i * 80),
                            50 + (i * 80),
                            "goober1"
                        )

                        spawnEnemy(
                            500 + (i * 80),
                            50 + (i * 80),
                            "goober2"
                        )
                    }

                    spawnEnemy(500, 25, "goober3")
                },

                // circle
                form4: ()=>{
                    
                    const cx = 600
                    const cy = 250
                    const radius = 200
                    const count = 14

                    for(let i = 0; i < count; i++){
                        enemyCount++
                        const angle = (Math.PI * 2 / count) * i

                        const x = cx + Math.cos(angle) * radius
                        const y = cy + Math.sin(angle) * radius

                        let type =
                            i % 5 === 0 ? "goober3" :
                            i % 2 === 0 ? "goober2" :
                            "goober1"

                        spawnEnemy(x, y, type)
                    }
                },

                // zigzag
                form5: ()=>{
                    
                    for(let i = 0; i < 12; i++){
                        enemyCount++
                        let y =
                            i % 2 === 0 ? 100 : 200

                        let type =
                            i < 4 ? "goober1" :
                            i < 8 ? "goober2" :
                            "goober3"

                        spawnEnemy(
                            100 + (i * 90),
                            y,
                            type
                        )
                    }
                }
            }

            const formkeys = Object.keys(formations)

            const randomFormation =
                formkeys[Math.floor(Math.random() * formkeys.length)]
            console.log(randomFormation)
            formations[randomFormation]()
        }
        function spawnLaser(){
            const laser = document.createElement("img")
            laser.className = "laser"
            laser.src = "assets/laser.png"
            const shipRect = ship.getBoundingClientRect()
            const laserX = shipRect.left + (shipRect.width / 4) 
            document.body.appendChild(laser)
            laser.style.transform = `translate(${laserX}px, ${shipRect.top- 50}px)`
            let y = shipRect.top - 75
            let dy = 25
            laserInt = setInterval(()=>{
                y-=dy
                laser.style.transform = `translate(${laserX}px, ${y}px)`
                if(y >= window.innerHeight){
                    if(laser.parentNode){
                        document.body.removeChild(laser)
                    }
                    clearInterval(laserInt)
                }
                
            },80)
        }
        function createStar(){
            const newStar = document.createElement("div")
            newStar.className = "circle"
            //wh means width/height
            const wh = Math.ceil(Math.random() * 25)
            newStar.style.width = `${wh}px`
            newStar.style.height = `${wh}px`
            newStar.style.zIndex = "1"
            document.body.append(newStar)
            const pos = Math.floor(Math.random() * window.innerWidth)
            newStar.style.transform = `translate(${pos}px, 0px)`
            let y = 0
            let starMove = setInterval(()=>{
                y+=5
                newStar.style.transform = `translate(${pos}px,${y}px)`
                if(y>=window.innerHeight){
                    document.body.removeChild(newStar)
                    clearInterval(starMove)
                }
            },80)
        }
        let waves = 0
        let incrementWaves = true
        const startBtn = document.getElementById("startBtn")
        startBtn.addEventListener("click", ()=>{
            setInterval(()=>{
                if(keys["d"]){
                    x+=10
                }
                if(keys["a"]){
                    x-=10
                }
                if(keys[" "] && canShoot){
                    spawnLaser()
                    canShoot = false
                    setTimeout(()=>{
                        canShoot = true
                    },750)
                }
                ship.style.transform = `translate(${x}px, 0px) rotate(180deg)`
                if(enemyCount == 0 && incrementWaves){
                waves++
                incrementWaves = false
                setTimeout(()=>{
                    incrementWaves = true
                },3000)
                spawnFormation()
            }
            },16)
            
            startBtn.style.display = "none"
        })
        setInterval(()=>{
            const randomStarNum = Math.ceil(Math.random() * 5)
            for(let i = 0; i<=randomStarNum; i++){
                createStar()
            }
        },750)
        const ship = document.getElementById("ship")
        const keys = {}
        let x = 0
        document.addEventListener("keydown",(e)=>{
            keys[e.key] = true
        })
        document.addEventListener("keyup",(e)=>{
            keys[e.key] = false
        })
        let canShoot = true
        
    </script>
</body>
</html>
