<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slither.io</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .notice {
            padding: 1rem;
            text-align: center;
            background: #111;
            border-bottom: 1px solid #333;
        }
        .notice a {
            color: #6cf;
            text-decoration: none;
        }
        .notice button {
            margin-top: 0.75rem;
            padding: 0.75rem 1.25rem;
            font-size: 1rem;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            cursor: pointer;
        }
        .frame-wrap {
            flex: 1;
            min-height: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="notice">
        <strong>Slither.io may refuse to load inside an iframe.</strong>
        <p>If the game does not display, open it in a new tab.</p>
        <a href="https://slither.io" target="_blank" rel="noopener noreferrer">
            <button type="button">Open Slither.io</button>
        </a>
    </div>
    <div class="frame-wrap">
        <iframe src="https://slither.io" allowfullscreen></iframe>
    </div>
</body>
</html>
