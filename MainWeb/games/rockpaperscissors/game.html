<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
</head>
<body>
  <main class="game-shell">
    <section class="hero">
      <h1>Rock Paper Scissors</h1>
      <p>Play computer or play a friend by creating or joining a room.</p>
      <div class="mode-switch">
        <button class="mode-button selected" data-mode="computer">Play Computer</button>
        <button class="mode-button" data-mode="human">Play Human</button>
      </div>
    </section>

    <section class="battle-panel">
      <div class="card player-card">
        <span class="card-label">You</span>
        <img id="player" src="rock.png" alt="Player choice">
        <span id="playerChoice" class="choice-label">Rock</span>
        <span id="playerName" class="player-name"></span>
      </div>

      <div class="card result-card">
        <span id="resultText">Choose your move, then press Play.</span>
        <img id="winorlose" src="vs.png" alt="Versus icon">
      </div>

      <div class="card enemy-card">
        <span id="opponentLabel" class="card-label">Computer</span>
        <img id="enemy" src="mark.png" alt="Opponent choice">
        <span id="enemyChoice" class="choice-label">Waiting...</span>
        <span id="enemyName" class="player-name"></span>
      </div>
    </section>

    <section id="room-panel" class="room-panel hidden">
      <div class="room-actions">
        <div class="room-create">
          <input id="roomNameInput" placeholder="Enter room name" maxlength="24" />
          <button id="createRoomBtn" type="button">Create room</button>
        </div>
        <div class="room-list-box">
          <h3>Open rooms</h3>
          <div id="roomList" class="room-list">Loading rooms...</div>
        </div>
      </div>
      <div id="roomStatus" class="room-status hidden"></div>
    </section>

    <section class="choices-panel" id="choicesPanel">
      <button class="choice-button selected" id="rock" type="button" data-choice="rock">
        <img src="rock.png" alt="Rock">
        <span>Rock</span>
      </button>
      <button class="choice-button" id="paper" type="button" data-choice="paper">
        <img src="paper.png" alt="Paper">
        <span>Paper</span>
      </button>
      <button class="choice-button" id="scissors" type="button" data-choice="scissors">
        <img src="scissors.png" alt="Scissors">
        <span>Scissors</span>
      </button>
    </section>

    <section class="controls-panel">
      <button id="submit" type="button">Play</button>
      <button id="reset" type="button" class="secondary">Reset</button>
    </section>

    <section class="scoreboard">
      <div><strong>Wins:</strong> <span id="wins">0</span></div>
      <div><strong>Ties:</strong> <span id="ties">0</span></div>
      <div><strong>Losses:</strong> <span id="losses">0</span></div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const playerImg = document.getElementById("player");
    const enemyImg = document.getElementById("enemy");
    const resultText = document.getElementById("resultText");
    const playerChoiceLabel = document.getElementById("playerChoice");
    const enemyChoiceLabel = document.getElementById("enemyChoice");
    const playerName = document.getElementById("playerName");
    const enemyName = document.getElementById("enemyName");
    const opponentLabel = document.getElementById("opponentLabel");
    const choiceButtons = Array.from(document.querySelectorAll(".choice-button"));
    const submit = document.getElementById("submit");
    const reset = document.getElementById("reset");
    const winsDisplay = document.getElementById("wins");
    const tiesDisplay = document.getElementById("ties");
    const lossesDisplay = document.getElementById("losses");
    const roomPanel = document.getElementById("room-panel");
    const roomStatus = document.getElementById("roomStatus");
    const roomList = document.getElementById("roomList");
    const roomNameInput = document.getElementById("roomNameInput");
    const createRoomBtn = document.getElementById("createRoomBtn");
    const modeButtons = Array.from(document.querySelectorAll(".mode-button"));

    const choices = [
      { name: "rock", src: "rock.png" },
      { name: "paper", src: "paper.png" },
      { name: "scissors", src: "scissors.png" }
    ];

    const username = localStorage.getItem("username") || "";
    let selectedChoice = choices[0];
    let wins = 0;
    let ties = 0;
    let losses = 0;
    let currentMode = "computer";
    let currentRoom = null;
    let isHost = false;
    let hasMoved = false;
    let socket = null;

    function showRoomMessage(message, isError = false) {
      roomStatus.classList.remove("hidden");
      roomStatus.textContent = message;
      roomStatus.classList.toggle("room-error", isError);
    }

    function clearRoomMessage() {
      roomStatus.classList.add("hidden");
      roomStatus.textContent = "";
      roomStatus.classList.remove("room-error");
    }

    function updateSelection(choiceName) {
      selectedChoice = choices.find((choice) => choice.name === choiceName);
      playerImg.src = selectedChoice.src;
      playerChoiceLabel.textContent = selectedChoice.name.charAt(0).toUpperCase() + selectedChoice.name.slice(1);
      choiceButtons.forEach((button) => {
        button.classList.toggle("selected", button.dataset.choice === choiceName);
      });
    }

    choiceButtons.forEach((button) => {
      button.addEventListener("click", () => updateSelection(button.dataset.choice));
    });

    function updateScoreboard() {
      winsDisplay.textContent = wins;
      tiesDisplay.textContent = ties;
      lossesDisplay.textContent = losses;
    }

    function setMode(newMode) {
      currentMode = newMode;
      modeButtons.forEach((button) => {
        button.classList.toggle("selected", button.dataset.mode === newMode);
      });
      roomPanel.classList.toggle("hidden", newMode !== "human");
      opponentLabel.textContent = newMode === "computer" ? "Computer" : "Opponent";
      enemyName.textContent = newMode === "computer" ? "Computer" : "";
      playerName.textContent = username ? username : "";
      if (newMode === "human") {
        if (!username) {
          showRoomMessage("Login required to play human mode.");
        } else {
          connectSocket();
          showRoomMessage("Create or join a room to start a match.");
        }
      } else {
        clearRoomMessage();
        currentRoom = null;
      }
      updateActionButton();
    }

    function updateActionButton() {
      if (currentMode === "computer") {
        submit.textContent = "Play";
        submit.disabled = false;
        return;
      }

      if (!username) {
        submit.textContent = "Login to play";
        submit.disabled = true;
        return;
      }

      if (!currentRoom) {
        submit.textContent = "Join or create a room";
        submit.disabled = false;
        return;
      }

      if (currentRoom.status !== "playing") {
        submit.textContent = "Waiting for game to start";
        submit.disabled = true;
        return;
      }

      submit.textContent = hasMoved ? "Move submitted" : "Submit move";
      submit.disabled = hasMoved;
    }

    function getRoomRows(rooms) {
      if (!rooms.length) {
        return `<div class="room-empty">No open rooms. Create one to start.</div>`;
      }

      return rooms
        .map((room) => {
          const isOwned = room.host === username;
          const canJoin = room.status === "waiting" && !isOwned;
          return `
            <div class="room-card">
              <div class="room-title">${room.roomName}</div>
              <div class="room-meta">Host: ${room.host}</div>
              <div class="room-meta">Guest: ${room.guest || "Waiting..."}</div>
              <div class="room-meta">Status: ${room.status}</div>
              <button type="button" class="room-button" ${canJoin ? "" : "disabled"} data-room-id="${room.roomId}">
                ${canJoin ? "Join" : isOwned ? "Your room" : "Unavailable"}
              </button>
            </div>
          `;
        })
        .join("");
    }

    function updateRoomList(rooms) {
      roomList.innerHTML = getRoomRows(rooms.filter((room) => room.status !== "playing" || room.host === username || room.guest === username));
      roomList.querySelectorAll(".room-button").forEach((button) => {
        button.addEventListener("click", () => {
          const roomId = button.dataset.roomId;
          if (!roomId) return;
          socket.emit("join-room", { roomId, username });
        });
      });
    }

    function renderRoomStatus(room) {
      currentRoom = room;
      isHost = room.host === username;
      clearRoomMessage();
      const statusLines = [
        `<div><strong>${room.roomName}</strong></div>`,
        `<div class="room-detail">Host: ${room.host}</div>`,
        `<div class="room-detail">Guest: ${room.guest || "Waiting..."}</div>`,
        `<div class="room-detail">Status: ${room.status}</div>`
      ];

      if (room.status === "ready" && isHost) {
        statusLines.push(`<button id="startGameBtn" class="secondary">Start Game</button>`);
      }

      roomStatus.classList.remove("hidden");
      roomStatus.classList.remove("room-error");
      roomStatus.innerHTML = statusLines.join("");

      enemyName.textContent = room.status === "computer" ? "Computer" : room.host === username ? room.guest || "Waiting..." : room.host;
      if (currentMode === "human") {
        opponentLabel.textContent = "Opponent";
      }

      const startButton = document.getElementById("startGameBtn");
      if (startButton) {
        startButton.addEventListener("click", () => {
          socket.emit("start-game", { roomId: room.roomId, username });
        });
      }

      updateActionButton();
    }

    function openRoom(room) {
      renderRoomStatus(room);
      if (room.status === "waiting") {
        resultText.textContent = "Room created. Waiting for another player to join.";
        resultText.className = "";
      } else if (room.status === "ready") {
        resultText.textContent = isHost ? "Opponent joined. Start the game." : "Waiting for the host to start the game.";
        resultText.className = "";
      }
      updateActionButton();
    }

    function connectSocket() {
      if (socket) return;
      socket = io();

      socket.on("connect", () => {
        socket.emit("get-rooms");
      });

      socket.on("room-list", updateRoomList);
      socket.on("room-created", openRoom);
      socket.on("room-joined", openRoom);
      socket.on("room-updated", (room) => {
        if (currentRoom && room.roomId === currentRoom.roomId) {
          renderRoomStatus(room);
        }
      });
      socket.on("game-started", (room) => {
        renderRoomStatus(room);
        resultText.textContent = "Game started! Choose your move and submit.";
        resultText.className = "";
        hasMoved = false;
        updateActionButton();
      });
      socket.on("round-result", (payload) => {
        if (!currentRoom || payload.roomId !== currentRoom.roomId) return;

        const myMove = username === payload.host ? payload.hostMove : payload.guestMove;
        const otherMove = username === payload.host ? payload.guestMove : payload.hostMove;
        const myImage = choices.find((choice) => choice.name === myMove)?.src || "rock.png";
        const otherImage = choices.find((choice) => choice.name === otherMove)?.src || "rock.png";

        playerImg.src = myImage;
        playerChoiceLabel.textContent = myMove.charAt(0).toUpperCase() + myMove.slice(1);
        enemyImg.src = otherImage;
        enemyChoiceLabel.textContent = otherMove.charAt(0).toUpperCase() + otherMove.slice(1);

        if (payload.result === "tie") {
          ties += 1;
          resultText.textContent = "It's a tie.";
          resultText.className = "result-tie";
        } else if (payload.winner === username) {
          wins += 1;
          resultText.textContent = "You win!";
          resultText.className = "result-win";
        } else {
          losses += 1;
          resultText.textContent = "You lose.";
          resultText.className = "result-lose";
        }

        updateScoreboard();
        hasMoved = false;
        updateActionButton();
      });

      socket.on("room-closed", ({ reason }) => {
        currentRoom = null;
        roomStatus.classList.remove("hidden");
        roomStatus.textContent = reason || "Room closed.";
        roomStatus.classList.add("room-error");
        updateActionButton();
      });

      socket.on("room-error", (message) => {
        showRoomMessage(message, true);
      });
    }

    function createRoom() {
      if (!username) {
        showRoomMessage("Login required to create a room.", true);
        return;
      }
      const roomName = roomNameInput.value.trim();
      socket.emit("create-room", { roomName, username });
      roomNameInput.value = "";
    }

    function leaveRoom() {
      if (socket && currentRoom) {
        socket.emit("leave-room", { roomId: currentRoom.roomId, username });
        currentRoom = null;
        roomStatus.classList.add("hidden");
        clearRoomMessage();
      }
      hasMoved = false;
      updateActionButton();
    }

    function playComputer() {
      const computerChoice = choices[Math.floor(Math.random() * choices.length)];
      const result = getRoundResult(selectedChoice, computerChoice);
      if (result === "win") {
        wins += 1;
        resultText.textContent = "You win!";
        resultText.className = "result-win";
      } else if (result === "loss") {
        losses += 1;
        resultText.textContent = "You lose.";
        resultText.className = "result-lose";
      } else {
        ties += 1;
        resultText.textContent = "It's a tie.";
        resultText.className = "result-tie";
      }
      enemyImg.src = computerChoice.src;
      enemyChoiceLabel.textContent = computerChoice.name.charAt(0).toUpperCase() + computerChoice.name.slice(1);
      updateScoreboard();
    }

    function getRoundResult(player, computer) {
      if (player.name === computer.name) return "tie";
      if (
        (player.name === "rock" && computer.name === "scissors") ||
        (player.name === "paper" && computer.name === "rock") ||
        (player.name === "scissors" && computer.name === "paper")
      ) {
        return "win";
      }
      return "loss";
    }

    function resetGame() {
      wins = 0;
      ties = 0;
      losses = 0;
      updateScoreboard();
      hasMoved = false;
      if (currentMode === "human") {
        leaveRoom();
        showRoomMessage("Create or join a room to start a match.");
      } else {
        enemyImg.src = "mark.png";
        enemyChoiceLabel.textContent = "Waiting...";
        resultText.textContent = "Choose your move, then press Play.";
        resultText.className = "";
        updateSelection("rock");
      }
      updateActionButton();
    }

    submit.addEventListener("click", () => {
      if (currentMode === "computer") {
        playComputer();
        return;
      }
      if (!username) {
        showRoomMessage("Login required to play human mode.", true);
        return;
      }
      if (!currentRoom) {
        showRoomMessage("Join or create a room before playing.", true);
        return;
      }
      if (currentRoom.status !== "playing") {
        showRoomMessage("Wait until the game has started.", true);
        return;
      }
      if (hasMoved) {
        showRoomMessage("Move already submitted, wait for the opponent.", true);
        return;
      }
      socket.emit("player-move", {
        roomId: currentRoom.roomId,
        username,
        choice: selectedChoice.name
      });
      hasMoved = true;
      showRoomMessage("Move submitted. Waiting for result...");
      updateActionButton();
    });

    reset.addEventListener("click", resetGame);
    createRoomBtn.addEventListener("click", () => {
      if (!socket) connectSocket();
      createRoom();
    });
    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    setMode("computer");
    updateSelection("rock");
    updateScoreboard();
  </script>
</body>
</html>
