<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Runner</title>
</head>
<body>
  <div id="body"></div>
  <img src="hollowknight.png" id="boss">
  <img src="buddy.png" id="character">
  <div id="b1" class="barHealth"></div>
  <div id="b2" class="barHealth"></div>
  <div id="b3" class="barHealth"></div>
  <div id="b4" class="barHealth"></div>
  <div id="b5" class="barHealth"></div>
  <div id="b6" class="barHealth"></div>
  <div id="b7" class="barHealth"></div>
  <div id="b8" class="barHealth"></div>
  <div id="b9" class="barHealth"></div>
  <div id="b10" class="barHealth"></div>
  <script>
    const b1 = document.getElementById("b1")
    const b2 = document.getElementById("b2")
    const b3 = document.getElementById("b3")
    const b4 = document.getElementById("b4")
    const b5 = document.getElementById("b5")
    const b6 = document.getElementById("b6")
    const b7 = document.getElementById("b7")
    const b8 = document.getElementById("b8")
    const b9 = document.getElementById("b9")
    const b10 = document.getElementById("b10")
    const bArray = [b1, b2, b3, b4, b5, b6, b7, b8, b9, b10]
    const character=document.getElementById("character")
    const boss=document.getElementById("boss")
    const background = document.getElementById("body")
    const charRect = character.getBoundingClientRect()
    const bossRect = boss.getBoundingClientRect()
    const topBoss = bossRect.top
    const topChar = charRect.top
    const vh = window.innerHeight
    const vl = window.innerWidth
    const keys={}
    const sendBarrel = [false, true, false, false]
    let y = 0
    let bossHealth = 10
    let x = 0
    let shield = false
    let velocityY = 0
    let onGround = true
    let shieldImg = null
    let lastShield = Date.now()
    let shieldKeyDown = false
    document.addEventListener("keydown",(e)=>{
      keys[e.key] = true
    })
    document.addEventListener("keyup", (e)=>{
      keys[e.key]=false
    })
    function jump(){
      const charRect2 = character.getBoundingClientRect()
      
      if (keys["w"]){
        if(onGround){
          velocityY = -20
          onGround = false
        }
      }
      velocityY+=0.5
      y+=velocityY
      if(y >= 0){
        velocityY=0
        onGround=true
        y=0
      } 
      if(keys["e"] && !shieldKeyDown && Date.now() - lastShield >= 3000 && !shieldImg){
        shieldKeyDown = true
        shield = true
        shieldImg = document.createElement("img")
        shieldImg.src = "shield.png"
        shieldImg.id = "shield"
        shieldImg.style.top = `${charRect2.top}px`
        shieldImg.style.left = `${charRect2.left}px`
        document.body.appendChild(shieldImg)
        setTimeout(()=>{
          shield = false
          if(shieldImg != null){shieldImg.remove()}
          shieldImg=null
          lastShield = Date.now()
        },1000)
      }
      if(!keys["e"]) {
        shieldKeyDown = false
      }
      if(shieldImg != null){
        shieldImg.style.top = `${charRect2.top}px`
        shieldImg.style.left = `${charRect2.left}px`
      }
      character.style.transform = `translate(${x}px,${y}px)`
    }
    function isCollision(obj1, obj2){
      const a = obj1.getBoundingClientRect()
      const b = obj2.getBoundingClientRect()
      return ( 
        a.right > b.left &&
        a.left < b.right &&
        a.bottom > b.top &&
        a.top < b.bottom
      )
    }
    jumpInt = setInterval(jump, 16)
    rollInt = setInterval(()=>{
      let randomChoice = sendBarrel[Math.floor(Math.random() * sendBarrel.length)]

      if(randomChoice){
        const newBarrel = document.createElement("img")
        newBarrel.src = "barrel.png"
        newBarrel.classList.add("barrel")
        newBarrel.style.top = `${((topChar / vh)*100)+3}%`
        document.body.appendChild(newBarrel)

        let roll = 0

        const barrelRoll = setInterval(()=>{
          roll += 6
          newBarrel.style.transform = `translateX(-${roll}px) rotate(-${roll}deg)`

          if (isCollision(character, newBarrel)){
            x -= 125
            character.style.transform = `translate(${x}px, ${y}px)`
            newBarrel.remove()
            clearInterval(barrelRoll)
          }
          else if(isCollision(boss, newBarrel)){
            bossHealth -= 1
            bArray[bossHealth].style.backgroundColor="red"
            newBarrel.remove()
            clearInterval(barrelRoll)
          }
        },16)
      }
    },2000)
    collisionInt = setInterval(()=>{
      if(isCollision(character, boss)){
        const h1 = document.createElement("h1")
        const replay = document.createElement("button")
        replay.textContent = "Play Again"
        
        h1.id = "h1"
        h1.textContent = "You Lost! Would You Like to Play Again?"
        document.body.append(h1)
        document.body.append(replay)
        clearInterval(collisionInt)
        clearInterval(rollInt)
        clearInterval(jumpInt)
        clearInterval(bossAttack)
        replay.addEventListener("click", () => {
          location.reload()
        })
      }
      if(bossHealth<=0){
        const h1 = document.createElement("h1")
        h1.id = "h1"
        h1.textContent = "You Won! Would You Like to Play Again?"
        const replay = document.createElement("button")
        replay.textContent = "Play Again"
        
        document.body.append(h1)
        document.body.append(replay)
        clearInterval(collisionInt)
        clearInterval(rollInt)
        clearInterval(jumpInt)
        clearInterval(bossAttack)
        replay.addEventListener("click", () => {
          location.reload()
        })
      }
    },16)
    bossAttack = setInterval(()=>{
      const slash = document.createElement("img")
      slash.src = "slash1.png"
      slash.id = "slash"
      slash.style.top = `${(topBoss/vh)*100}%`
      document.body.appendChild(slash)
      let move = 0
      slashMove = setInterval(()=>{
        move+=2
        slash.style.transform = `translateX(${move}px)`
        if(isCollision(slash, character) && !shield){
          x -= 125
          character.style.transform = `translate(${x}px, ${y}px)`
          slash.remove()
          clearInterval(slashMove)
        }
        else if(shield && isCollision(slash, character)){
          slash.remove()
          clearInterval(slashMove)
        }
      },16)
    },10000)
  </script>
</body>
</html>
