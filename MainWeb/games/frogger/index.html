<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Frogger — Shank's Co.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="frogger-shell">
    <h1>Tax Evasion: Arcade (Fictional Game)</h1>
    <p class="hint">Collect mysterious "bundles" and try to deposit them in the Vault while avoiding Auditors. This is a purely fictional arcade game — do not attempt unlawful activity in real life.</p>
    <canvas id="game" width="540" height="600" aria-label="Tax evasion simulator (game)"></canvas>
    <div class="hud">
      <span id="reputation">Reputation: 3</span>
      <span id="stash">Unreported stash: $0</span>
      <span id="score">Score: 0</span>
      <button id="restart">Restart</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const TILE = 60;
    const COLS = canvas.width / TILE; // 9
    const ROWS = canvas.height / TILE; // 10

    const lanes = [
      { row: 1, speed: 2.6, dir: 1, color: '#c33' },
      { row: 2, speed: 1.8, dir: -1, color: '#c93' },
      { row: 3, speed: 2.4, dir: 1, color: '#c33' },
      { row: 4, speed: 1.6, dir: -1, color: '#c93' },
      { row: 5, speed: 2.2, dir: 1, color: '#c33' },
      { row: 6, speed: 1.4, dir: -1, color: '#c93' },
      { row: 7, speed: 2.0, dir: 1, color: '#c33' }
    ];

    let cars = []; // auditors
    let tokens = []; // unreported bundles
    let lastSpawnAuditor = 0;
    let lastSpawnToken = 0;
    let frog = { col: Math.floor(COLS/2), row: ROWS-1, w: TILE*0.8, h: TILE*0.8 };
    let reputation = 3;
    let stash = 0;
    let score = 0;
    let playing = true;

    const repEl = document.getElementById('reputation');
    const stashEl = document.getElementById('stash');
    const scoreEl = document.getElementById('score');
    document.getElementById('restart').addEventListener('click', resetGame);

    function resetGame(){
      cars = [];
      tokens = [];
      frog.col = Math.floor(COLS/2);
      frog.row = ROWS-1;
      reputation = 3;
      stash = 0;
      score = 0;
      playing = true;
      updateHud();
    }

    function updateHud(){
      repEl.textContent = 'Reputation: ' + reputation;
      stashEl.textContent = 'Unreported stash: $' + stash;
      scoreEl.textContent = 'Score: ' + score;
    }

    function spawnAuditors(dt){
      // spawn auditors (cars) per lane with spacing
      lastSpawnAuditor += dt;
      if (lastSpawnAuditor >= 400){
        lastSpawnAuditor = 0;
        lanes.forEach((lane, idx) => {
          const y = lane.row * TILE + (TILE - TILE*0.6)/2;
          if (Math.random() < 0.6) {
            const lengthTiles = 1 + Math.floor(Math.random()*2);
            const w = lengthTiles * TILE * 0.9;
            let x = lane.dir === 1 ? -w - Math.random()*200 : canvas.width + Math.random()*200;
            cars.push({ x, y, w, h: TILE*0.6, speed: lane.speed * (0.6 + Math.random()*0.9), dir: lane.dir, laneIdx: idx });
          }
        });
      }
    }

    function spawnTokens(dt){
      // spawn collectible bundles on the road occasionally
      lastSpawnToken += dt;
      if (lastSpawnToken < 800) return;
      lastSpawnToken = 0;
      // pick a random lane and column
      const laneIdx = 1 + Math.floor(Math.random()*7); // lanes 1..7
      const col = Math.floor(Math.random()*COLS);
      const x = col * TILE + (TILE - TILE*0.4)/2;
      const y = laneIdx * TILE + (TILE - TILE*0.4)/2;
      tokens.push({ x, y, w: TILE*0.4, h: TILE*0.4, value: 50 + Math.floor(Math.random()*150) });
    }

    function update(dt){
      if (!playing) return;
      spawnCars(dt);
      // move auditors
      cars.forEach(c=>{
        c.x += c.dir * c.speed * (dt/16);
      });
      // spawn collectibles
      spawnTokens(dt);
      // remove offscreen auditors
      cars = cars.filter(c=> c.x + c.w > -300 && c.x < canvas.width + 300);

      // check token collection first
      const frogRect = {
        x: frog.col*TILE + (TILE - frog.w)/2,
        y: frog.row*TILE + (TILE - frog.h)/2,
        w: frog.w, h: frog.h
      };
      for (let i = tokens.length-1; i>=0; i--){
        const t = tokens[i];
        if (rectsOverlap(frogRect, t)){
          stash += t.value;
          tokens.splice(i,1);
          updateHud();
        }
      }

      // collision with auditors (being investigated)
      let hit = false;
      cars.forEach(c=>{
        if (rectsOverlap(frogRect, c) && frog.row >=1 && frog.row <=7){
          hit = true;
        }
      });
      if (hit){
        caughtByAuditor();
      }

      // win check
      if (frog.row === 0){
        score += 100;
        updateHud();
        resetFrogToStart();
      }
    }

    function caughtByAuditor(){
      reputation--;
      stash = 0; // confiscated in-game
      updateHud();
      if (reputation <= 0){
        playing = false;
        setTimeout(()=> alert('Investigation ended — game over. Score: ' + score + '\n\nThis was a fictional game.'), 50);
      }
      resetFrogToStart();
    }

    function resetFrogToStart(){
      frog.col = Math.floor(COLS/2);
      frog.row = ROWS-1;
    }

    function rectsOverlap(a,b){
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function draw(){
      // background
      ctx.fillStyle = '#87CEEB'; // sky/water top
      ctx.fillRect(0,0,canvas.width,TILE);
      // grass band under water
      ctx.fillStyle = '#6b8e23';
      ctx.fillRect(0,TILE,canvas.width,TILE);

      // draw lanes
      for(let r=1;r<=7;r++){
        ctx.fillStyle = r%2? '#444' : '#333';
        ctx.fillRect(0, r*TILE, canvas.width, TILE);
      }

      // draw bottom safe zone
      ctx.fillStyle = '#228B22';
      ctx.fillRect(0, 8*TILE, canvas.width, TILE*2);

      // tokens (bundles)
      tokens.forEach(t=> drawToken(t));

      // auditors (sprite-like)
      cars.forEach(c=> drawCar(c));

      // frog (sprite)
      const fx = frog.col*TILE + (TILE - frog.w)/2;
      const fy = frog.row*TILE + (TILE - frog.h)/2;
      drawFrog(fx + frog.w/2, fy + frog.h/2, frog.w*0.5);
    }

    function drawToken(t){
      ctx.fillStyle = '#ffd24d';
      ctx.beginPath(); ctx.arc(t.x + t.w/2, t.y + t.h/2, t.w*0.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('$' + t.value, t.x + t.w/2, t.y + t.h/2);
    }

    function drawCar(c){
      // body
      ctx.fillStyle = '#ff5f1f';
      roundRect(ctx, c.x, c.y, c.w, c.h, 8, true, true);
      // window
      ctx.fillStyle = '#aee7ff';
      const winW = c.w*0.5; const winH = c.h*0.4;
      const winX = c.dir>0 ? c.x + c.w*0.15 : c.x + c.w*0.35;
      const winY = c.y + c.h*0.15;
      roundRect(ctx, winX, winY, winW, winH, 4, true, false);
      // wheels
      ctx.fillStyle = '#222';
      const wheelR = Math.max(6, c.h*0.18);
      ctx.beginPath(); ctx.arc(c.x + wheelR + 6, c.y + c.h + 2, wheelR, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.x + c.w - wheelR - 6, c.y + c.h + 2, wheelR, 0, Math.PI*2); ctx.fill();
    }

    function drawFrog(cx, cy, r){
      // body
      ctx.fillStyle = '#2E8B57';
      ctx.beginPath(); ctx.ellipse(cx, cy, r*0.9, r*0.65, 0, 0, Math.PI*2); ctx.fill();
      // belly
      ctx.fillStyle = '#a7e6c2';
      ctx.beginPath(); ctx.ellipse(cx, cy + r*0.18, r*0.6, r*0.35, 0, 0, Math.PI*2); ctx.fill();
      // eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - r*0.4, cy - r*0.6, r*0.28, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + r*0.4, cy - r*0.6, r*0.28, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx - r*0.4, cy - r*0.6, r*0.12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + r*0.4, cy - r*0.6, r*0.12, 0, Math.PI*2); ctx.fill();
      // smile
      ctx.strokeStyle = '#074'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy + r*0.05, r*0.4, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke){
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    let last = performance.now();
    function loop(now){
      const dt = now - last;
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // keyboard controls; one-step per keydown
    window.addEventListener('keydown', (e)=>{
      if(!playing) return;
      const tag = (e.target && e.target.tagName) || '';
      if (['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
      if (['ArrowLeft','a','A'].includes(e.key)) { if (frog.col>0) frog.col--; }
      if (['ArrowRight','d','D'].includes(e.key)) { if (frog.col<COLS-1) frog.col++; }
      if (['ArrowUp','w','W'].includes(e.key)) { if (frog.row>0) frog.row--; }
      if (['ArrowDown','s','S'].includes(e.key)) { if (frog.row<ROWS-1) frog.row++; }
    });

    // simple touch: click to hop up
    canvas.addEventListener('click', ()=>{ if (frog.row>0) frog.row--; });

    updateHud();
  </script>
</body>
</html>
