<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boss Battle</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="pageWrapper">
    <header>
      <div class="title">Boss Battle Arena</div>
      <div class="controls">
        <button id="startButton" type="button">Start Battle</button>
        <button id="restartButton" type="button">Restart</button>
      </div>
    </header>
    <main id="gameScreen">
      <canvas id="bossCanvas"></canvas>
      <div class="hint">A/D or ←/→ to move • Shift to dash • Left click to shoot • Follow the cursor</div>
    </main>
    <footer>Collect S for shield, + for heal, and R for rapid-fire.</footer>
  </div>
  <script src="bossBattle.js"></script>
</body>
</html>
