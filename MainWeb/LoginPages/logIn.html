<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../Assets/styles.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In</title>
  <link rel="icon" type="image/x-icon" href="../../Assets/imgs/favicon.ico">
</head>
<body>
  <header class="headDiv">
    <a href="../../index.html" class="aImg">
      <img src="../../Assets/imgs/projectnevermore.png" alt="Shank's Co." class="imgHead">
    </a>
    <div class="headDivSpacer"></div>
    <h1 class="mainHeader">Shank's Co.</h1>
        <nav class="navigation">
            <ul class="navList">
              <li><a class="a" href="../../MainWeb/products.html">Products</a></li>
              <li><a class="a" href="../../MainWeb/about.html">About</a></li>
              <li><a class="a" href="../../MainWeb/contact.html">Contacts</a></li>
              <li><a class="a" href="../../MainWeb/games.html">Games</a></li>
              <li><a class="a" href="../../MainWeb/music.html">Music</a></li>
              <li><a href="../../MainWeb/LoginPages/logIn.html"><div class="logIn">Log In!</div></a></li>
              <li><a href="../../MainWeb/LoginPages/signUp.html"><div class="signUp">Sign Up!</div></a></li>
            </ul>
        </nav>
  </header>
  <main>
    <section class="logInSection">
      <h2>Log In to Your Account</h2>
      <form id="logInForm" action="https://shanksco.org/login" method="POST" class="logInForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        
        <button type="submit">Log In</button>
      </form>
      <div id="error"></div>
    </section>
  </main>
  <footer class="footDiv">
    <div class="footText">
      <p>Copyright &copy; 2024 Shank's Co. All rights reserved.</p>
    </div>
  </footer>
  <script src="../../Assets/scripts/usernamePlace.js"></script>
  <script src="../../Assets/scripts/logout.js"></script>
  <script>
    document.getElementById('logInForm').addEventListener('submit', function(e) {
      const username = document.getElementById('username').value;
      if (username) {
        localStorage.setItem('username', username);
      }
    });
  </script></body>
</html>
