<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../Assets/styles.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
</head>
<body>
  <header class="headDiv">
    <a href="../../index.html">
      <img src="../../Assets/imgs/projectnevermore.png" alt="Shank's Co." class="imgHead">
    </a>
    <h1 class="mainHeader">Shank's Co.</h1>
    <nav class="navigation">
        <ul class="navList">
          <li><a href="../products.html">Products</a></li>
          <li><a href="../about.html">About</a></li>

    <a href="logIn.html"><div class="logIn">Log In!</div></a>
    <a href="signUp.html"><div class="signUp">Sign Up!</div></a>
  </header>
  <main>
    <h2 id="signUpHead">Create Your Account</h2>
    <form id="signUpForm" action="http://localhost:5000/signup" method="POST">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>
      
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>
      
      <button type="submit">Sign Up</button>
    </form>
  </main>
