<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../Assets/styles.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="icon" type="image/x-icon" href="../../Assets/imgs/favicon.ico">
</head>
<body>
  <header class="headDiv">
    <a href="../../index.html" class="aImg">
      <img src="../../Assets/imgs/projectnevermore.png" alt="Shank's Co." class="imgHead">
    </a>
    <div class="headDivSpacer"></div>
    <h1 class="mainHeader">Shank's Co.</h1>
        <nav class="navigation">
            <ul class="navList">
              <li><a class="a" href="../../MainWeb/products.html">Products</a></li>
              <li><a class="a" href="../../MainWeb/about.html">About</a></li>
              <li><a class="a" href="../../MainWeb/contact.html">Contacts</a></li>
              <li><a class="a" href="../../MainWeb/games.html">Games</a></li>
              <li><a class="a" href="../../MainWeb/music.html">Music</a></li>
              <li><a href="../../MainWeb/LoginPages/logIn.html"><div class="logIn">Log In!</div></a></li>
              <li><a href="../../MainWeb/LoginPages/signUp.html"><div class="signUp">Sign Up!</div></a></li>
            </ul>
        </nav>
  </header>
  <main>
    <h2 id="signUpHead">Create Your Account</h2>
    <form id="signupForm">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>
      
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>
      
      <button id="submit" type="submit">Sign Up</button>
      <button id="resendVerificationBtn" type="button" class="secondary">Resend verification email</button>
    </form>
    <div id="error"></div>
  </main>
  <footer class="footDiv">
    <div class="footText">
      <p>Copyright &copy; 2024 Shank's Co. All rights reserved.</p>
    </div>
  </footer>
  <script src="../../Assets/scripts/usernamePlace.js"></script>
  <script src="../../Assets/scripts/logout.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {

        const signupForm = document.getElementById("signupForm");

        signupForm.addEventListener("submit", async (event) => {

            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const email = document.getElementById("email").value;

            try {

                const response = await fetch("https://shanksco.org/signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username,
                        password,
                        email
                    })
                });

                console.log("STATUS:", response.status);

                const text = await response.text();

                console.log("RAW RESPONSE:");
                console.log(text);

                const data = JSON.parse(text);

                if (!data.success) {
                    alert(data.message);
                    return;
                }

                alert("Account created! Check your email.");

                window.location.href = "/MainWeb/LoginPages/logIn.html";

            } catch (error) {

                console.error("Signup error:", error);

                alert("Something went wrong.");

            }

        });

        document.getElementById("resendVerificationBtn").addEventListener("click", async () => {
          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          if (!username || !email) {
            alert("Enter username and email to resend the verification link.");
            return;
          }

          try {
            const response = await fetch("https://shanksco.org/resend-verification", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, email })
            });
            const data = await response.json();
            if (!data.success) {
              alert(data.message || "Unable to resend verification email.");
              return;
            }
            alert("Verification email resent. Check your inbox.");
          } catch (err) {
            console.error(err);
            alert("Failed to resend verification email.");
          }
        });

    });
  </script>
</body>
</html>
